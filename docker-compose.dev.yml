name: xd

services:
  postgres:
    image: postgres:16-alpine
    container_name: xd_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: deep
      POSTGRES_PASSWORD: smthn
      POSTGRES_DB: xd_db

    volumes:
      - xd_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U deep -d xd_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    ports:
      - '5432:5432'

    # networks:
    #   - backend

  redis:
    image: redis:7-alpine
    container_name: xd_redis
    restart: unless-stopped

    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--appendfsync',
        'everysec',
        '--save',
        '900',
        '1',
        '--save',
        '300',
        '10',
        '--save',
        '60',
        '10000',
      ]

    volumes:
      - xd_redis_data:/data

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    ports:
      - '6379:6379'

    # networks:
    #   - backend

volumes:
  xd_postgres_data:
  xd_redis_data:

# networks:
#   backend:
#     driver: bridge
